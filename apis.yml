  - url: json-ld/cms-gov-context.jsonld
    type: JSONLD
  - type: NaftikoCapability
    url: capabilities/blue-button-fhir.yaml
  description: Blue Button 2.0 is a developer-friendly, OAuth 2.0-enabled, HL7 FHIR R4 standard data API that delivers
    Medicare Part A, B, and D claims data for 60+ million Medicare beneficiaries to applications, services, and
    research programs. Includes Patient, Coverage, and ExplanationOfBenefit resources for the beneficiary's
    consented data.
- aid: cms-gov:beneficiary-claims-data-api
  name: CMS Beneficiary Claims Data API (BCDA)
  tags:
  - Healthcare
  - Medicare
  - FHIR
  - Bulk Data
  - ACO
  - Claims
  - Government
  humanURL: https://bcda.cms.gov/
  baseURL: https://api.bcda.cms.gov/api/v2
  properties:
  - url: https://bcda.cms.gov/
    type: Documentation
  - url: https://bcda.cms.gov/guide.html
    type: Documentation
  - url: https://sandbox.bcda.cms.gov/
    type: Sandbox
  - url: openapi/cms-gov-bcda-openapi.yml
    type: OpenAPI
  - type: NaftikoCapability
    url: capabilities/bcda-bulk-fhir.yaml
  description: BCDA enables Medicare Shared Savings Program Accountable Care Organizations (ACOs) to retrieve bulk
    Medicare Parts A, B, and D claims data for their assigned and assignable beneficiaries via the HL7 FHIR Bulk
    Data Access (Flat FHIR) specification. Uses asynchronous $export endpoints returning NDJSON resources for
    Patient, Coverage, and ExplanationOfBenefit.
- aid: cms-gov:ab2d-api
  name: CMS AB2D API
  tags:
  - Healthcare
  - Medicare
  - FHIR
  - Bulk Data
  - Part D
  - Claims
  - Government
  humanURL: https://ab2d.cms.gov/
  baseURL: https://api.ab2d.cms.gov/api/v2
  properties:
  - url: https://ab2d.cms.gov/
    type: Documentation
  - url: https://ab2d.cms.gov/getting-started/
    type: Documentation
  - url: https://sandbox.ab2d.cms.gov/swagger-ui/
    type: Console
  - url: openapi/cms-gov-ab2d-openapi.yml
    type: OpenAPI
  - type: NaftikoCapability
    url: capabilities/ab2d-bulk-fhir.yaml
  description: AB2D (Claim and Claim Line Feed) delivers Medicare Parts A, B, and D claims data to Part D
    prescription drug plan sponsors via the HL7 FHIR Bulk Data Access specification. Supports asynchronous
    $export of ExplanationOfBenefit resources as NDJSON for all enrolled Medicare beneficiaries since 2020.
- aid: cms-gov:data-at-point-of-care-api
  name: CMS Data at the Point of Care API (DPC)
  tags:
  - Healthcare
  - Medicare
  - FHIR
  - Bulk Data
  - Provider
  - Government
  humanURL: https://dpc.cms.gov/
  baseURL: https://sandbox.dpc.cms.gov/api/v1
  properties:
  - url: https://dpc.cms.gov/
    type: Documentation
  - url: https://dpc.cms.gov/docs
    type: Documentation
  - url: openapi/cms-gov-dpc-openapi.yml
    type: OpenAPI
  - type: NaftikoCapability
    url: capabilities/dpc-bulk-fhir.yaml
  description: Data at the Point of Care fills gaps in patient history by delivering Medicare claims data via HL7
    FHIR Bulk Data Access to fee-for-service providers at the point of care. Providers register Practitioner,
    Organization, Group, and Patient roster resources, then asynchronously $export ExplanationOfBenefit, Coverage,
    and Patient resources.
- aid: cms-gov:bfd-api
  name: CMS Beneficiary FHIR Data Server (BFD)
  tags:
  - Healthcare
  - Medicare
  - FHIR
  - Claims
  - Beneficiary
  - Government
  humanURL: https://bfd.cms.gov/
  properties:
  - url: https://bfd.cms.gov/
    type: Documentation
  - url: https://github.com/CMSgov/beneficiary-fhir-data
    type: SourceCode
  - url: openapi/cms-gov-bfd-openapi.yml
    type: OpenAPI
  - type: NaftikoCapability
    url: capabilities/bfd-fhir.yaml
  description: The Beneficiary FHIR Data (BFD) Server is the upstream HL7 FHIR R4 service that powers Blue Button
    2.0, BCDA, AB2D, and DPC. BFD ingests claims from the CMS Chronic Conditions Warehouse (CCW) and exposes
    Patient, Coverage, and ExplanationOfBenefit resources with both synchronous and bulk asynchronous access.
    Internal/peering access only; clients use the downstream Blue Button, BCDA, AB2D, or DPC APIs.
- aid: cms-gov:marketplace-api
  name: CMS Marketplace API
  tags:
  - Healthcare
  - Marketplace
  - Insurance
  - ACA
  - Plans
  - Government
  humanURL: https://developer.cms.gov/marketplace-api/
  baseURL: https://marketplace.api.healthcare.gov/api/v1
  properties:
  - url: https://developer.cms.gov/marketplace-api/
    type: Documentation
  - url: https://www.cms.gov/marketplace/resources/data/public-use-files
    type: Documentation
  - url: openapi/cms-gov-marketplace-openapi.yml
    type: OpenAPI
  - type: NaftikoCapability
    url: capabilities/marketplace-plans.yaml
  description: The Marketplace API exposes Qualified Health Plan (QHP) and Stand-alone Dental Plan (SADP) data
    from healthcare.gov including plan finder, plan compare, plan rates, plan benefits, plan crosswalks, and
    issuer details. Powers consumer plan-shopping experiences across HealthCare.gov and partner brokers.
- aid: cms-gov:data-cms-gov-api
  name: CMS Open Data API (data.cms.gov)
  tags:
  - Healthcare
  - Open Data
  - Datasets
  - Socrata
  - Government
  humanURL: https://data.cms.gov/
  baseURL: https://data.cms.gov/data-api/v1
  properties:
