    type: Portal
  - url: https://data.cms.gov/provider-data/
    type: Documentation
  - url: https://data.cms.gov/data.json
    type: Schema
  - url: openapi/cms-gov-open-data-openapi.yml
    type: OpenAPI
  - type: NaftikoCapability
    url: capabilities/open-data-datasets.yaml
  description: The CMS Open Data API exposes the full catalog of public CMS datasets — Medicare provider utilization
    and payment files, Medicare Advantage and Part D enrollment, Hospital Compare, Nursing Home Compare, Physician
    Compare, Open Payments (Sunshine Act), Marketplace public-use files, and the Provider Data Catalog. Datasets
    are queryable via filtered JSON/CSV downloads and dataset-level data-api endpoints.
- aid: cms-gov:provider-data-catalog-api
  name: CMS Provider Data Catalog API
  tags:
  - Healthcare
  - Quality
  - Provider
  - Hospitals
  - Compare
  - Government
  humanURL: https://data.cms.gov/provider-data/
  baseURL: https://data.cms.gov/provider-data/api/1
  properties:
  - url: https://data.cms.gov/provider-data/
    type: Portal
  - url: https://data.cms.gov/provider-data/docs
    type: Documentation
  - url: openapi/cms-gov-provider-data-openapi.yml
    type: OpenAPI
  - type: NaftikoCapability
    url: capabilities/provider-data-catalog.yaml
  description: The Provider Data Catalog API surfaces the quality and compare datasets that powered the legacy
    Hospital Compare, Nursing Home Compare, Home Health Compare, Hospice Compare, Long-Term Care Hospital
    Compare, Inpatient Rehabilitation Facility Compare, Dialysis Facility Compare, and Physician Compare sites
    via CKAN DKAN-compatible dataset and resource endpoints.
- aid: cms-gov:quality-payment-program-api
  name: CMS Quality Payment Program API
  tags:
  - Healthcare
  - Quality
  - MIPS
  - MACRA
  - Provider
  - Government
  humanURL: https://qpp.cms.gov/about/resource-library
  baseURL: https://qpp.cms.gov/api
  properties:
  - url: https://qpp.cms.gov/about/resource-library
    type: Documentation
  - url: https://github.com/CMSgov/qpp-measures-data
    type: SourceCode
  - url: openapi/cms-gov-qpp-openapi.yml
    type: OpenAPI
  - type: NaftikoCapability
    url: capabilities/quality-payment-program.yaml
  description: The Quality Payment Program (QPP) API supports the Merit-based Incentive Payment System (MIPS) and
    Advanced Alternative Payment Models (APMs) under MACRA. Exposes measures, benchmarks, scoring, and submission
    endpoints used by Qualified Registries, EHR vendors, and QCDRs to submit clinician performance data and
    retrieve scoring metadata.
- aid: cms-gov:medicare-coverage-database-api
  name: CMS Medicare Coverage Database API
  tags:
  - Healthcare
  - Medicare
  - Coverage
  - Policy
  - LCD
  - NCD
  - Government
  humanURL: https://www.cms.gov/medicare-coverage-database/
  properties:
  - url: https://www.cms.gov/medicare-coverage-database/
    type: Portal
  - url: https://www.cms.gov/medicare-coverage-database/reports/reports.aspx
    type: Documentation
  - url: openapi/cms-gov-mcd-openapi.yml
    type: OpenAPI
  - type: NaftikoCapability
    url: capabilities/medicare-coverage-database.yaml
  description: The Medicare Coverage Database (MCD) exposes National Coverage Determinations (NCDs), Local
    Coverage Determinations (LCDs), Local Coverage Articles, Proposed Decisions, National Coverage Analyses, and
    Medicare Evidence Development & Coverage Advisory Committee (MEDCAC) records. Powers coverage policy lookups
    by HCPCS code, ICD-10, contractor jurisdiction, and state.
name: CMS — Centers for Medicare & Medicaid Services
description: The Centers for Medicare & Medicaid Services (CMS) is the U.S. federal agency within the Department
  of Health and Human Services that administers Medicare, Medicaid, the Children's Health Insurance Program (CHIP),
  the Health Insurance Marketplace, and the broader CMS open-data program. CMS operates one of the largest
  collections of HL7 FHIR APIs in the U.S. federal government — Blue Button 2.0, BCDA, AB2D, DPC, and the
  upstream BFD server — alongside the Marketplace API, the data.cms.gov open-data catalog, the Provider Data
  Catalog, the Quality Payment Program API, and the Medicare Coverage Database.
